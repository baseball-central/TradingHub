                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Max DD distribution */}
            <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: '16px 20px' }}>
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 14, fontFamily: 'Space Grotesk, sans-serif', letterSpacing: '0.08em', textTransform: 'uppercase' }}>MAX DRAWDOWN DISTRIBUTION</div>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: 'JetBrains Mono, monospace', fontSize: 13 }}>
                <tbody>
                  {[
                    ['P5 (best case)', result.p5DD, C.green, 'Only 5% stayed this shallow'],
                    ['P25', result.negMaxDDs[Math.floor(result.numPaths*0.25)], C.green, 'Top quarter'],
                    ['P50 (median)', result.medianDD, 'var(--th-accent,#4da6ff)', '← Typical worst DD'],
                    ['P75', result.negMaxDDs[Math.floor(result.numPaths*0.75)], C.amber, 'Unlucky but realistic'],
                    ['P95 (worst case)', result.p95DD, C.red, '95% stayed above this'],
                    ['Mean', result.meanDD, C.textSec, 'Average max DD'],
                    ['Your Actual DD', Math.abs(actual.maxDD), 'var(--th-accent,#4da6ff)', '← Historical worst'],
                  ].map(([label, val, color, note], i) => (
                    <tr key={i} style={{ borderBottom: `1px solid ${C.border}` }}>
                      <td style={{ padding: '9px 0', color: C.textSec, fontSize: 12, fontFamily: 'Space Grotesk, sans-serif' }}>{label}</td>
                      <td style={{ padding: '9px 0', textAlign: 'right', color, fontWeight: 700 }}>-{fmtCur(val)}</td>
                      <td style={{ padding: '9px 0 9px 10px', color: C.textMuted, fontSize: 11 }}>{note}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Lucid Flex survival */}
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: '16px 20px' }}>
            <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 14, fontFamily: 'Space Grotesk, sans-serif', letterSpacing: '0.08em', textTransform: 'uppercase' }}>LUCID FLEX — TRAILING DD SURVIVAL ANALYSIS</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 12, marginBottom: 16 }}>
              {[
                { label: 'Paths Survived', value: (result.numPaths - result.breachedCount).toLocaleString(), color: C.green },
                { label: 'Paths Breached', value: result.breachedCount.toLocaleString(), color: C.red },
                { label: 'Survival Rate', value: fmtPct(result.survivalRate), color: result.survivalRate >= 0.6 ? C.green : C.amber },
                { label: 'Median Breach Trade', value: result.medianBreachTrade ? `Trade ${result.medianBreachTrade}` : 'N/A', color: C.red },
              ].map((s, i) => <StatCard key={i} label={s.label} value={s.value} color={s.color} small />)}
            </div>
            <div style={{ background: C.surface, borderRadius: 8, padding: '12px 16px', fontSize: 13, color: C.textSec, lineHeight: 1.6 }}>
              <strong style={{ color: result.survivalRate >= 0.6 ? C.green : C.amber }}>
                {fmtPct(result.survivalRate)} survival rate
              </strong>{' '}
              across {result.n.toLocaleString()} trades with a $2,000 trailing drawdown.
              {result.medianBreachTrade && ` Median breach occurs at trade ${result.medianBreachTrade} — the early phase is the danger zone.`}
              {' '}Your historical max DD of {fmtCur(actual.maxDD)} is{' '}
              {Math.abs(actual.maxDD) < result.medianDD
                ? <span style={{ color: C.green }}>better than the median path — you got relatively lucky.</span>
                : <span style={{ color: C.amber }}>near or worse than the median path.</span>}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ===== PAYOUT STRATEGY TAB =====

function Payout({ trades, account }) {
  const C = CHART_COLORS;
  const acct = account || { ddLimit: 2000, payoutSplit: 0.90, withdrawMax: 0.50, combineCost: 135, passRate: 0.40, qualifyingDays: 5, qualifyingThreshold: 150, firm: 'Prop Firm', commission: 0 };
  const stats = React.useMemo(function() { return computeStats(trades, acct.ddLimit, acct.qualifyingThreshold); }, [trades, acct.ddLimit, acct.qualifyingThreshold]);

            </tbody>

        </div>

        <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 14, fontFamily: 'Space Grotesk, sans-serif', letterSpacing: '0.08em', textTransform: 'uppercase' }}>POST-PAYOUT BUFFER RISK — based on 12-year backtest (126 drawdowns)</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 10 }}>
          {ddBenchmarks.map((b, i) => (
            <div key={i} style={{ background: C.surface, borderRadius: 8, padding: '12px 14px', borderLeft: `3px solid ${b.survival >= 0.94 ? C.green : b.survival >= 0.90 ? C.amber : C.red}` }}>

        </div>
        <div style={{ marginTop: 12, fontSize: 12, color: C.textMuted, lineHeight: 1.6 }}>
          After a payout, MLL resets to $0. Your new buffer = your new balance. Larger balance = safer post-payout position.

    </div>
  );
}
